<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 40px;
        }
        input{
            padding: 10px;
            margin: 10px;
            width: 250px;
        }
        button{
            padding: 10px 15px;
            margin: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <input type="text" id="myInput">
    <button id="myButton">Submit</button>
    <p id="output"></p>
    <script>
        document.getElementById('myButton').addEventListener('click', function() {
            let value = document.getElementById('myInput').value;
            alert(value);
            document.getElementById('output').innerText = 'Entered value: ' + value;
        });
    </script>
</body>
</html>
